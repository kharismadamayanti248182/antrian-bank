body{

.sidebar{
width:368px;
height:auto;
background:linear-gradient(#6095F0, #9ABCF7);  
padding:25px;

}

.logo{
width: 211px;

.menu button{

padding:40px;

}

}

.card{

height: 351px;
margin:25px auto;
background:#BCD4FF;
border-radius:8px;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
}

.card-header{
background:#E4EEFF;
display:inline-block;
padding:8px 20px;
font-size: 32px;
border-radius:8px;
margin-top:20px;
font-weight:500;
}

.nomor{
font-size:96px;
font-weight:bold;
margin:20px 0;
color:#454545;
}

.loket{
background:#EFF5FF;
padding:15px;
font-weight:500;
border-top:1px solid #ccc;
border-radius:0 0 8px 8px;
}

</style>
</head>
