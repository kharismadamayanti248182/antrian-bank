<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kartu</title>
</head>
<style>
    body {
        font-family: "Poppins", sans-serif;
        margin: 0;
        background: #e4eeff;
        animation: fadeIn 0.5s forwards;
      }

      .container {
        display: flex;
        height: 1024px;
        width: 1440px;
      }

       /* SIDEBAR */

      .sidebar {
        width: 368px;
        color: white;
        padding: 20px 20px;
        display: flex;
        flex-direction: column;
        background:
          url(batik.png),
          linear-gradient(rgba(96, 149, 240, 0.8), rgba(154, 188, 247, 0.8));

        background-size: cover;
        background-position: center;
      }

      .bri {
        width: 211px;
        margin-bottom: 30px;
        height: 138px;
      }

      .btn {
        width: 313px;
        height: 62px;
        border: none;
        padding: 12px;
        margin-left: 30px;
        margin-right: 30px;
        margin-bottom: 18px;
        border-radius: 6px;
        font-weight: bold;
        font-size: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        box-shadow: 0 6px 10px rgba(0, 0, 0, 0.1);
        transition: 0.3s ease;
      }

      .btn:hover {
        transform: translateY(-2px);
      }

      .green {
        background: #72b64d;
        color: white;
        border: 2px solid white;
      }

      .blue {
        background: #5b82c5;
        color: white;
        border: 1px solid #2e569b;
      }

      .yellow {
        background: #c4a771;
        color: white;
        border: 1px solid #4657c6;
      }

      .btn-green:hover {
        background: #3da239;
      }

      .btn-blue:hover {
        background: #2e569b;
        border: 2px solid white;
      }

      .btn-yellow:hover {
        background: #967332;
        border: 2px solid white;
      }

      .footer {
        margin-top: auto;
        font-size: 12px;
        opacity: 0.8;
        margin-left: 130px;
      }

    /* CONTENT */
    
    .row{
        display:grid;
        grid-template-columns:150px 20px 1fr;
        align-items:center;
        margin-bottom:15px;
        font-size:18px;
        }

        .label{
        text-align:left;
        }

        .titik{
        text-align:center;
        }

    .content{
        flex:1;
        padding:40px;
        text-align:center;
    }

    .content h1{
        margin-bottom:30px;
        letter-spacing:2px;
    }   

    /* CARD */

    .card-container{
        display:flex;
        gap:40px;
        justify-content:center;
        margin-top: 70px;
    }

    .card{
        width:465px;
        height: 337px;
        top: 159px;
        left: 410px;
        background:white;
        border-radius:10px;
        padding:20px;
        box-shadow:0 3px 8px rgba(0,0,0,0.1);
    }

    .info{
        text-align:left;
        margin-bottom:50px;
    }

    .info p{
        margin:10px 0;
        font-size:14px;
    }

    .info input{
        border:1px solid #ccc;
        border-radius:5px;
        padding:4px;
    }

    /* TICKET */

    .ticket{
        width:287px;
        height:176px;
        background:#b9cbea;
        border-radius:50px;
        position:relative;
        margin:20px auto;
        display:flex;
        align-items:center;
        justify-content:center;
        }

    .ticket img{
        width:100%;
        opacity:0.5;
        }

    .ticket h2{
        position:absolute;
        top:20%;
        left:50%;
        transform:translate(-50%,-50%);
        font-size:70px;
        color:#333;
        text-align: center;
    }

    .input-box {
        width: 203px;
        height: 27px;
        background: white;
        padding: 5px 10px;
        border-radius: 5px;
        border: 1px solid black;
        display: inline-block;
    }
</style>
<body>
    <div class="container">
      <!-- SIDEBAR -->
      <div class="sidebar">
        <img class="bri" src="Rectangle 9.png" alt="bri" />

        <button class="btn green">
          <img src="ri_train-fill.png" />Ambil Antrian
        </button>
        <button class="btn blue" onclick="location.href = 'contoh2.html'">
          <img src="pixelarticons_calendar-today.png" />Daftar Antrian
        </button>
        <button class="btn yellow">
          <img src="Check-Square--Streamline-Ultimate.svg.png" />Kartu Antrian
        </button>

        <div class="footer">Kelompok (1) 2026</div>
      </div>

      <!-- CONTENT -->
    <div class="content">

        <h1>KARTU ANTRIAN</h1>

        <div class="card-container">

            <!-- CARD 1 -->
            <div class="card">

                <div class="info">
                    <div class="row">
                        <span class="label">Nomor Telepon</span>
                        <span class="titik">:</span>
                        <span class="input-box">0876543545667</span>
                    </div>

                    <div class="row">
                        <span class="label">Loket</span>
                        <span class="titik">:</span>
                        <span class="input-box">Teller</span>
                    </div>
                </div>

                <div class="ticket">
                    <img src="orang.png">
                    <h2>001</h2>
                </div>

            </div>

            <!-- CARD 2 -->
            <div class="card">

                <div class="info">
                    <div class="row">
                        <span class="label">Nomor Telepon</span>
                        <span class="titik">:</span>
                        <span class="input-box">081577890987</span>
                    </div>

                    <div class="row">
                        <span class="label">Loket</span>
                        <span class="titik">:</span>
                        <span class="input-box">Customer Service</span>
                    </div>
                </div>
                <div class="ticket">
                    <img src="orang.png">
                    <h2>002</h2>
                </div>
            </div>
        </div>
    </div>


</body>
</html>
