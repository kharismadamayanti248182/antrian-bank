<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login - Reservasi Antrian Bank</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins, sans-serif;
}

body{
background:#9fb6d9;
height:100vh;
text-align:center;
}

/* LOGO */

.logo{
position:absolute;
top:30px;
left:40px;
text-align:left;
color:#1d3d7c;
font-weight:bold;
}

.logo span{
color:red;
}

/* GAMBAR */

.illustration{
margin-top:80px;
}

.illustration img{
width:550px;
}

/* BUTTON */

.button-container{
margin-top:60px;
display:flex;
justify-content:center;
gap:80px;
}

button{
width:220px;
padding:15px;
border:none;
border-radius:8px;
background:#e6e6e6;
font-weight:bold;
cursor:pointer;
box-shadow:0 3px 6px rgba(0,0,0,0.2);
}

/* EMAIL LINE */

.email{
margin-top:40px;
display:flex;
align-items:center;
justify-content:center;
gap:15px;
color:white;
font-size:14px;
}

.line{
width:120px;
height:1px;
background:white;
}

</style>
</head>

<body>

<!-- LOGO -->
<div class="logo">
BANK BRI <br>
Reservasi <span>Antrian</span>
</div>

<!-- GAMBAR -->
<div class="illustration">
<img src="bank.png" alt="Ilustrasi Bank">
</div>

<!-- BUTTON -->
<div class="button-container">
<button>LOGIN</button>
<button>REGISTER</button>
</div>

<!-- EMAIL -->
<div class="email">
<div class="line"></div>
<div>Email</div>
<div class="line"></div>
</div>

</body>
</html>
