<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kartu Antrian</title>
<link rel="stylesheet" href="style.css">
</head>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:
    url(gelombang.png),
    linear-gradient(rgba(96, 149, 240, 0.8), rgba(154, 188, 247, 0.8));
    background-size: cover;
    background-position: center;
}

/* LAYOUT */

.container{
    display:flex;
    height:100vh;
}

/* SIDEBAR */

.sidebar{
    width:368px;
    padding:20px;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    background:
    url(batik.png),
    linear-gradient(rgba(96, 149, 240, 0.8), rgba(154, 188, 247, 0.8));
    background-size: cover;
    background-position: center;
}

.logo img{
    width:180px;
    margin-bottom:40px;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:15px;
    margin-top: -270px;
}

.btn{
    padding:12px;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
    color:white;

}

.green{
    border:2px solid #4657C6;
    width: 313px;
    top: 159px;
    left: 30px;
    background:#81C55D;
    box-shadow: 0 1px 3px #545454;
}

.blue{
    border:2px solid #4657C6;
    width: 313px;
    top: 159px;
    left: 30px;
    background:#5B82C5;
    box-shadow: 0 1px 3px #545454;
}

.gold{
    border:2px solid #ffff;
    width: 313px;
    top: 159px;
    left: 30px;
    background:#967332;
    box-shadow: 0 1px 3px #545454;
}

.footer{
    font-size:12px;
    text-align:center;
    opacity:0.8;
}

/* CONTENT */

.content{
    flex:1;
    padding:40px;
    text-align:center;
}

.content h1{
    margin-bottom:30px;
    letter-spacing:2px;
}

/* CARD */

.card-container{
    display:flex;
    gap:40px;
    justify-content:center;
    margin-top: 70px;
}

.card{
    width:465px;
    height: 337px;
    top: 159px;
    left: 410px;
    background:white;
    border-radius:10px;
    padding:20px;
    box-shadow:0 3px 8px rgba(0,0,0,0.1);

}

.info{
    text-align:left;
    margin-bottom:20px;
}

.info p{
    margin:10px 0;
    font-size:14px;
}

.info input{
    border:1px solid #ccc;
    border-radius:5px;
    padding:4px;
}

/* TICKET */

.ticket{
    width: 287px;
    height: 159px;
    left: 70px;
    background:#b9cbea;
    border-radius:50px;
    padding:30px;
    position:relative;
}

.ticket img{
    width:100%;
    opacity:0.5;
}

.ticket h2{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:40px;
    color:#333;
}

</style>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="logo">
            <img src="logo.png">
        </div>

        <div class="menu">
            <button class="btn green">Ambil Antrian</button>
            <button class="btn blue">Daftar Antrian</button>
            <button class="btn gold">Kartu Antrian</button>
        </div>

        <div class="footer">
            Kelompok (1) 2026
        </div>

    </div>

    <!-- CONTENT -->
    <div class="content">

        <h1>KARTU ANTRIAN</h1>

        <div class="card-container">

            <!-- CARD 1 -->
            <div class="card">

                <div class="info">
                    <p>Nomor Telepon : <input type="text" value="0876543545667"></p>
                    <p>Loket : <input type="text" value="Teller"></p>
                </div>

                <div class="ticket">
                    <img src="orang.png">
                    <h2>001</h2>
                </div>

            </div>

            <!-- CARD 2 -->
            <div class="card">

                <div class="info">
                    <p>Nomor Telepon : <input type="text" value="081577890987"></p>
                    <p>Loket : <input type="text" value="Customer Service"></p>
                </div>

                <div class="ticket">
                    <img src="orang.png">
                    <h2>002</h2>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
